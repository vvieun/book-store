spring.config.import=optional:file:./config/techui-external.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=bookstore
spring.datasource.password=bookstore

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.main.banner-mode=off
spring.main.log-startup-info=false
server.error.include-message=always

bookstore.recommendation.collaborative-weight=0.6

logging.file.name=logs/bookstore-techui.log
logging.file.error.name=logs/bookstore-errors.log
logging.level.root=INFO
logging.level.ru.bookstore=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
