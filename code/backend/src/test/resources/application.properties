spring.application.name=bookstore-business-logic-test

# @DataJpaTest без встроенной БД — только указанный ниже PostgreSQL
spring.test.database.replace=none

# PostgreSQL — единственная реляционная СУБД проекта (совпадает с application-postgres.properties)
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=bookstore
spring.datasource.password=bookstore

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
